    count: 1
    ram_mb: 350
    cpu_pct: 15
    disk_io_mbps: 2
    disk_storage_mb: 100
  - name: google-ads-read
    count: 4
    ram_mb: 256
    cpu_pct: 12
    disk_io_mbps: 3
  - name: sonnet-researcher
    count: 1
    ram_mb: 200
    cpu_pct: 10
    disk_io_mbps: 1

add_load:
  signet_connections: 8
  n8n_webhooks_per_min: 15
  embedding_proxy_requests_per_min: 10

duration_minutes: 240
