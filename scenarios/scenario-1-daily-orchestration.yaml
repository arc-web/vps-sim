name: daily-orchestration
description: "openclaw handles Discord, calls Signet, spawns 1-2 Haiku sub-agents. ZeroClaw heartbeat. n8n webhooks. No ao spawn, no local LLM."
last_calibrated: "2026-03-30"
stale_after_days: 30

concurrency:
  ao_workers: 0
  zeroclaw_active: true
  researcher_agents: 1

add_processes:
  - name: haiku-subagent
    count: 2
    ram_mb: 120
    cpu_pct: 5
    disk_io_mbps: 1
    disk_storage_mb: 50

add_load:
  signet_connections: 2
  n8n_webhooks_per_min: 3
  embedding_proxy_requests_per_min: 2

duration_minutes: 1440
